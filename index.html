<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Q版3D卡通人物 - 婚礼喜庆版 | 可拖拽交互看板娘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0e0 0%, #ffe0c4 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 6rem 2rem;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.8rem;
            color: #c53a1f;
            text-shadow: 3px 3px 0 #ffc2a1;
            margin-bottom: 1rem;
        }

        .sub {
            font-size: 1.2rem;
            color: #b45a2e;
            background: rgba(255, 240, 225, 0.8);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 2rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0;
        }

        .card {
            background: rgba(255, 248, 240, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #ffecd9;
            color: #5a3a28;
        }

        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #e05a2c;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1rem;
            color: #b67b4a;
            border-top: 2px dashed #ffcfaa;
        }

        .tip-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            color: #fff1e0;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 999;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .content { padding: 1rem 1rem 4rem 1rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="content">
    <h1>🎉 喜庆Q版动漫人物 🎉</h1>
    <div class="sub">🤵 泡面卷黑发 + 黑框眼镜 + 红玫瑰胸花 | 拖拽我一起玩耍吧 🤵</div>
    <div class="card-grid">
        <div class="card">
            <h3>💐 婚礼喜庆风</h3>
            <p>胸前佩戴红玫瑰胸花，笑容灿烂，右手比出胜利V字手势，活力满满！</p>
        </div>
        <div class="card">
            <h3>✌️ 有趣交互</h3>
            <p>拖拽任意移动，大眼睛跟随你的鼠标，还会自动眨眼，点击时冒出可爱气泡~</p>
        </div>
        <div class="card">
            <h3>🧸 Q版3D质感</h3>
            <p>泡面卷发+黑框眼镜+连帽外套，圆润五官，打造超萌立体卡通形象。</p>
        </div>
    </div>
    <p style="background: #ffdfc4; padding: 1rem; border-radius: 2rem; text-align: center; color: #ab5a32;">
        🎈 把我拖拽到任意卡片上 → 我就是你的喜庆婚礼吉祥物！ 点击还会有随机祝福 🎈
    </p>
    <footer>
        🌟 拖拽移动 | 眼睛跟随鼠标 | 自动眨眼 | V字手势微微摆动 | 点击触发祝福语 🌟
    </footer>
</div>

<div id="character-wrapper" style="position: fixed; left: 60px; bottom: 80px; z-index: 9999; cursor: grab; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25));">
    <canvas id="animeCanvas" width="200" height="200" style="display: block; width: 200px; height: 200px; pointer-events: auto; border-radius: 50%;"></canvas>
    <div id="bubble" style="position: absolute; top: -45px; left: 60px; background: white; padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: bold; color: #c1441a; box-shadow: 0 4px 10px rgba(0,0,0,0.1); white-space: nowrap; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; border: 1px solid #ffaa77;">
        💬 嗨！拖拽我呀~
    </div>
</div>

<script>
    (function(){
        const wrapper = document.getElementById('character-wrapper');
        const canvas = document.getElementById('animeCanvas');
        const ctx = canvas.getContext('2d');
        const bubble = document.getElementById('bubble');
        const SIZE = 200;
        canvas.width = SIZE;
        canvas.height = SIZE;

        // 动画/交互变量
        let blink = false;
        let timeGesture = 0;          // 用于V字手势轻微摆动
        let mouseX = SIZE/2, mouseY = SIZE/2;   // 鼠标相对于canvas坐标(眼睛跟随)
        let globalMouseX = window.innerWidth/2, globalMouseY = window.innerHeight/2;
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let bubbleTimeout = null;

        // ---------- 眨眼调度 ----------
        function scheduleBlink() {
            const delay = 2200 + Math.random() * 2800;
            setTimeout(() => {
                blink = true;
                setTimeout(() => { blink = false; }, 150);
                scheduleBlink();
            }, delay);
        }
        scheduleBlink();

        // ---------- 拖拽逻辑 (完全保留) ----------
        function constrainBounds(left, top) {
            const maxLeft = window.innerWidth - SIZE;
            const maxTop = window.innerHeight - SIZE;
            return {
                left: Math.min(maxLeft, Math.max(0, left)),
                top: Math.min(maxTop, Math.max(0, top))
            };
        }
        function setWrapperPosition(left, top) {
            const bounded = constrainBounds(left, top);
            wrapper.style.left = bounded.left + 'px';
            wrapper.style.top = bounded.top + 'px';
            return bounded;
        }
        function showBubble(message, duration = 1800) {
            if (bubbleTimeout) clearTimeout(bubbleTimeout);
            bubble.style.opacity = '1';
            bubble.innerText = message;
            bubbleTimeout = setTimeout(() => { bubble.style.opacity = '0'; }, duration);
        }
        function onDragStart(e) {
            e.preventDefault();
            let clientX, clientY;
            if (e.type === 'mousedown') { clientX = e.clientX; clientY = e.clientY; }
            else if (e.type === 'touchstart') { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else return;
            isDragging = true;
            const rect = wrapper.getBoundingClientRect();
            dragStartX = clientX - rect.left;
            dragStartY = clientY - rect.top;
            wrapper.style.cursor = 'grabbing';
            showBubble('✨ 拖拽中 ✨', 600);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', onDragEnd);
            window.addEventListener('touchmove', onDragMove, { passive: false });
            window.addEventListener('touchend', onDragEnd);
        }
        function onDragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            let clientX, clientY;
            if (e.type === 'mousemove') { clientX = e.clientX; clientY = e.clientY; }
            else if (e.type === 'touchmove') { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            else return;
            let newLeft = clientX - dragStartX;
            let newTop = clientY - dragStartY;
            const bounded = constrainBounds(newLeft, newTop);
            wrapper.style.left = bounded.left + 'px';
            wrapper.style.top = bounded.top + 'px';
        }
        function onDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            wrapper.style.cursor = 'grab';
            window.removeEventListener('mousemove', onDragMove);
            window.removeEventListener('mouseup', onDragEnd);
            window.removeEventListener('touchmove', onDragMove);
            window.removeEventListener('touchend', onDragEnd);
            showBubble('🎉 就在这里啦！ 🎉', 1200);
        }
        function onCharacterClick(e) {
            e.stopPropagation();
            const messages = [
                '💖 新婚快乐，百年好合！', '🌹 送你一朵小红花~', '✌️ 耶！胜利！',
                '🎊 喜庆吉祥，万事如意！', '🍾 干杯！要幸福哦', '✨ 今天超开心！',
                '🧧 红包拿来~~', '🌸 愿甜蜜常伴左右'
            ];
            showBubble(`💬 ${messages[Math.floor(Math.random() * messages.length)]}`, 1600);
            wrapper.style.transform = 'scale(1.02)';
            setTimeout(() => { wrapper.style.transform = ''; }, 150);
        }

        // 鼠标跟随 (更新眼睛目标)
        function updateMousePosition(e) {
            if (e.clientX !== undefined) {
                globalMouseX = e.clientX;
                globalMouseY = e.clientY;
            }
            const canvasRect = canvas.getBoundingClientRect();
            let relX = globalMouseX - canvasRect.left;
            let relY = globalMouseY - canvasRect.top;
            mouseX = Math.min(SIZE, Math.max(0, relX));
            mouseY = Math.min(SIZE, Math.max(0, relY));
        }
        window.addEventListener('mousemove', updateMousePosition);
        window.addEventListener('touchmove', (e) => { if(e.touches.length) updateMousePosition(e.touches[0]); });
        window.addEventListener('touchstart', (e) => { if(e.touches.length) updateMousePosition(e.touches[0]); });

        // 初始化位置
        function initPosition() {
            setWrapperPosition(window.innerWidth - 240, window.innerHeight - 260);
        }

        // ---------- 核心绘图: Q版3D卡通人物 ----------
        // 泡面卷黑发 | 黑框眼镜 | 黑色连帽外套 | 红玫瑰胸花 | 右手V字手势 | 活泼笑容
        function drawCharacter() {
            ctx.clearRect(0, 0, SIZE, SIZE);
            
            // 时间变量用于动态微调 (V字手势轻微摆动，增加生动感)
            timeGesture += 0.03;
            const handWave = Math.sin(timeGesture) * 2;   // 手腕轻微偏移
            
            // ========== 1. 身体 (黑色连帽外套) ==========
            ctx.save();
            // 身体躯干 (圆润梯形)
            ctx.beginPath();
            ctx.moveTo(SIZE/2 - 38, SIZE/2 + 40);
            ctx.quadraticCurveTo(SIZE/2, SIZE/2 + 75, SIZE/2 + 38, SIZE/2 + 40);
            ctx.lineTo(SIZE/2 + 48, SIZE/2 + 80);
            ctx.quadraticCurveTo(SIZE/2, SIZE/2 + 95, SIZE/2 - 48, SIZE/2 + 80);
            ctx.closePath();
            ctx.fillStyle = "#2D2D2D";
            ctx.fill();
            ctx.fillStyle = "#1F1F1F";
            ctx.beginPath();
            ctx.ellipse(SIZE/2, SIZE/2 + 58, 28, 32, 0, 0, Math.PI*2);
            ctx.fill();
            // 连帽衫帽子 (头后两侧 + 帽檐)
            ctx.fillStyle = "#2A2A2A";
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 25, SIZE/2 - 12, 20, 18, -0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(SIZE/2 + 25, SIZE/2 - 12, 20, 18, 0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(SIZE/2 - 35, SIZE/2 - 15);
            ctx.quadraticCurveTo(SIZE/2, SIZE/2 - 32, SIZE/2 + 35, SIZE/2 - 15);
            ctx.fill();
            
            // ========== 2. 头部 (圆润肤色) ==========
            ctx.beginPath();
            ctx.arc(SIZE/2, SIZE/2 - 8, 52, 0, Math.PI*2);
            ctx.fillStyle = "#FCE5CD";
            ctx.fill();
            ctx.shadowBlur = 0;
            // 腮红 (圆润可爱)
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 38, SIZE/2 + 6, 9, 6, 0, 0, Math.PI*2);
            ctx.fillStyle = "#FFB7A8";
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(SIZE/2 + 38, SIZE/2 + 6, 9, 6, 0, 0, Math.PI*2);
            ctx.fill();
            
            // ========== 3. 泡面卷黑发 (许多小圈圈) ==========
            // 发色深褐/黑
            ctx.fillStyle = "#2B2118";
            // 头顶主发区
            ctx.beginPath();
            ctx.ellipse(SIZE/2, SIZE/2 - 48, 38, 28, 0, 0, Math.PI*2);
            ctx.fill();
            // 泡面卷: 绘制一系列小螺旋圈 (模拟卷发)
            const curls = [
                [SIZE/2-28, SIZE/2-52], [SIZE/2-16, SIZE/2-58], [SIZE/2, SIZE/2-60], 
                [SIZE/2+18, SIZE/2-56], [SIZE/2+32, SIZE/2-48], [SIZE/2-40, SIZE/2-42],
                [SIZE/2+40, SIZE/2-42], [SIZE/2-22, SIZE/2-62], [SIZE/2+26, SIZE/2-62],
                [SIZE/2-10, SIZE/2-64], [SIZE/2+12, SIZE/2-63], [SIZE/2-46, SIZE/2-32],
                [SIZE/2+46, SIZE/2-32], [SIZE/2-48, SIZE/2-20], [SIZE/2+48, SIZE/2-20]
            ];
            ctx.fillStyle = "#362812";
            for(let c of curls) {
                ctx.beginPath();
                ctx.arc(c[0], c[1], 6, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(c[0]-2, c[1]-1, 2.5, 0, Math.PI*2);
                ctx.fillStyle = "#4D3824";
                ctx.fill();
                ctx.fillStyle = "#362812";
            }
            // 刘海区域小卷毛
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 18, SIZE/2 - 48, 12, 10, -0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(SIZE/2 + 20, SIZE/2 - 48, 12, 10, 0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(SIZE/2, SIZE/2 - 54, 10, 9, 0, 0, Math.PI*2);
            ctx.fill();
            
            // 耳朵 (小圆)
            ctx.fillStyle = "#F5CBA7";
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 48, SIZE/2 - 12, 9, 12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(SIZE/2 + 48, SIZE/2 - 12, 9, 12, 0, 0, Math.PI*2);
            ctx.fill();
            
            // ========== 4. 眼睛 (跟随鼠标) + 黑框眼镜 ==========
            // 先画眼白和瞳孔 (让眼镜框覆盖在上方，但镜框要大且透明中心)
            const leftEyeX = SIZE/2 - 22;
            const leftEyeY = SIZE/2 - 10;
            const rightEyeX = SIZE/2 + 22;
            const rightEyeY = SIZE/2 - 10;
            
            // 瞳孔偏移限制 (跟随鼠标)
            let dx = (mouseX - SIZE/2) / (SIZE/2);
            let dy = (mouseY - (SIZE/2 - 8)) / 80;
            let maxOffset = 8;
            let offsetX = Math.min(maxOffset, Math.max(-maxOffset, dx * maxOffset));
            let offsetY = Math.min(maxOffset-2, Math.max(-maxOffset+2, dy * maxOffset));
            
            // 眼睛白底 (圆)
            ctx.fillStyle = "#FFFFFF";
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(leftEyeX, leftEyeY, 12, 14, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(rightEyeX, rightEyeY, 12, 14, 0, 0, Math.PI*2);
            ctx.fill();
            
            // 瞳孔 (黑色+高光)
            let leftPupilX = leftEyeX + offsetX;
            let leftPupilY = leftEyeY + offsetY;
            let rightPupilX = rightEyeX + offsetX;
            let rightPupilY = rightEyeY + offsetY;
            
            if(!blink) {
                ctx.fillStyle = "#221C15";
                ctx.beginPath();
                ctx.arc(leftPupilX, leftPupilY, 6, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rightPupilX, rightPupilY, 6, 0, Math.PI*2);
                ctx.fill();
                // 高光
                ctx.fillStyle = "#FFFFFF";
                ctx.beginPath();
                ctx.arc(leftPupilX-2, leftPupilY-2, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rightPupilX-2, rightPupilY-2, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(leftPupilX+1.5, leftPupilY+1, 1, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rightPupilX+1.5, rightPupilY+1, 1, 0, Math.PI*2);
                ctx.fill();
            } else {
                // 眨眼效果: 画眼皮遮盖
                ctx.fillStyle = "#FCE5CD";
                ctx.beginPath();
                ctx.ellipse(leftEyeX, leftEyeY, 12, 4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(rightEyeX, rightEyeY, 12, 4, 0, 0, Math.PI*2);
                ctx.fill();
                // 睫毛
                ctx.fillStyle = "#6B4C3B";
                for(let i=0;i<3;i++){
                    ctx.fillRect(leftEyeX-8 + i*4, leftEyeY-3, 1.5, 4);
                    ctx.fillRect(rightEyeX-8 + i*4, rightEyeY-3, 1.5, 4);
                }
            }
            
            // 黑框眼镜 (粗框风格)
            ctx.lineWidth = 2.8;
            ctx.strokeStyle = "#1E1E1E";
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            // 左镜框
            ctx.beginPath();
            ctx.ellipse(leftEyeX, leftEyeY, 16, 18, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            // 右镜框
            ctx.beginPath();
            ctx.ellipse(rightEyeX, rightEyeY, 16, 18, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            // 鼻梁横梁
            ctx.beginPath();
            ctx.moveTo(leftEyeX+12, leftEyeY);
            ctx.lineTo(rightEyeX-12, rightEyeY);
            ctx.lineWidth = 3;
            ctx.stroke();
            // 镜腿装饰
            ctx.beginPath();
            ctx.moveTo(leftEyeX-16, leftEyeY);
            ctx.lineTo(leftEyeX-24, leftEyeY-3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(rightEyeX+16, rightEyeY);
            ctx.lineTo(rightEyeX+24, rightEyeY-3);
            ctx.stroke();
            
            // ========== 5. 活泼笑容 + 小酒窝 ==========
            ctx.beginPath();
            ctx.arc(SIZE/2, SIZE/2 + 12, 22, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = "#B1452A";
            ctx.lineWidth = 2.5;
            ctx.stroke();
            // 小舌头
            ctx.beginPath();
            ctx.arc(SIZE/2, SIZE/2 + 20, 4, 0, Math.PI*2);
            ctx.fillStyle = "#FF7860";
            ctx.fill();
            
            // ========== 6. 胸前红玫瑰胸花 (左胸位置) ==========
            const roseX = SIZE/2 - 32;
            const roseY = SIZE/2 + 42;
            ctx.fillStyle = "#D32F2F";
            ctx.beginPath();
            ctx.ellipse(roseX, roseY, 7, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#B71C1C";
            ctx.beginPath();
            ctx.ellipse(roseX-2, roseY-1, 3, 4, -0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(roseX+2, roseY-1, 3, 4, 0.3, 0, Math.PI*2);
            ctx.fill();
            // 绿叶
            ctx.fillStyle = "#558B2F";
            ctx.beginPath();
            ctx.ellipse(roseX-5, roseY+2, 3, 5, -0.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(roseX+5, roseY+1, 3, 5, 0.5, 0, Math.PI*2);
            ctx.fill();
            
            // ========== 7. 右手V字手势 (画面右侧，带微摆) ==========
            // 手臂 (黑色外套袖子)
            ctx.fillStyle = "#2D2D2D";
            ctx.beginPath();
            ctx.moveTo(SIZE/2 + 42, SIZE/2 + 38);
            ctx.quadraticCurveTo(SIZE/2 + 58 + handWave*0.5, SIZE/2 + 28, SIZE/2 + 68 + handWave, SIZE/2 + 10);
            ctx.lineTo(SIZE/2 + 62, SIZE/2 + 6);
            ctx.quadraticCurveTo(SIZE/2 + 48, SIZE/2 + 24, SIZE/2 + 38, SIZE/2 + 34);
            ctx.fill();
            // 手部 (圆形)
            ctx.fillStyle = "#FCE5CD";
            ctx.beginPath();
            ctx.arc(SIZE/2 + 68 + handWave*0.8, SIZE/2 + 8, 9, 0, Math.PI*2);
            ctx.fill();
            // V字手势: 食指和中指伸出 (两条线 + 指尖)
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#FCE5CD";
            ctx.fillStyle = "#FCE5CD";
            // 食指
            ctx.beginPath();
            ctx.moveTo(SIZE/2 + 70 + handWave*0.8, SIZE/2 + 4);
            ctx.lineTo(SIZE/2 + 80 + handWave, SIZE/2 - 8);
            ctx.lineTo(SIZE/2 + 76 + handWave, SIZE/2 - 11);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(SIZE/2 + 79 + handWave, SIZE/2 - 9, 3, 0, Math.PI*2);
            ctx.fill();
            // 中指
            ctx.beginPath();
            ctx.moveTo(SIZE/2 + 70 + handWave*0.8, SIZE/2 + 4);
            ctx.lineTo(SIZE/2 + 86 + handWave, SIZE/2 - 4);
            ctx.lineTo(SIZE/2 + 84 + handWave, SIZE/2 - 8);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(SIZE/2 + 85 + handWave, SIZE/2 - 6, 3, 0, Math.PI*2);
            ctx.fill();
            // 其余手指握拳状小弧
            ctx.fillStyle = "#FCE5CD";
            ctx.beginPath();
            ctx.ellipse(SIZE/2 + 64 + handWave*0.6, SIZE/2 + 10, 4, 5, 0.2, 0, Math.PI*2);
            ctx.fill();
            
            // 增加一点手腕阴影
            ctx.fillStyle = "#D9AE82";
            ctx.beginPath();
            ctx.arc(SIZE/2 + 65 + handWave*0.7, SIZE/2 + 12, 3, 0, Math.PI*2);
            ctx.fill();
            
            // ========== 8. 左手自然插兜或者自然下垂 (简单带过) ==========
            ctx.fillStyle = "#2D2D2D";
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 38, SIZE/2 + 52, 12, 16, -0.4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#FCE5CD";
            ctx.beginPath();
            ctx.ellipse(SIZE/2 - 42, SIZE/2 + 58, 7, 8, -0.2, 0, Math.PI*2);
            ctx.fill();
            
            // ========== 9. 连帽外套细节：拉链/抽绳 ==========
            ctx.beginPath();
            ctx.moveTo(SIZE/2, SIZE/2 + 32);
            ctx.lineTo(SIZE/2, SIZE/2 + 65);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#888";
            ctx.stroke();
            for(let i=0;i<3;i++) {
                ctx.beginPath();
                ctx.moveTo(SIZE/2 + 3, SIZE/2 + 38 + i*9);
                ctx.lineTo(SIZE/2 - 3, SIZE/2 + 38 + i*9);
                ctx.stroke();
            }
            // 帽子抽绳小球
            ctx.fillStyle = "#CCAA77";
            ctx.beginPath();
            ctx.arc(SIZE/2 - 8, SIZE/2 + 32, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(SIZE/2 + 8, SIZE/2 + 32, 3, 0, Math.PI*2);
            ctx.fill();
            
            // 最后加一点高光/立体感
            ctx.fillStyle = "rgba(255,255,200,0.15)";
            ctx.beginPath();
            ctx.ellipse(SIZE/2-12, SIZE/2-24, 10, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }
        
        // 动画循环
        function animate() {
            drawCharacter();
            requestAnimationFrame(animate);
        }
        animate();
        
        function onWindowResize() {
            const left = parseFloat(wrapper.style.left);
            const top = parseFloat(wrapper.style.top);
            if(!isNaN(left)) setWrapperPosition(left, top);
            else initPosition();
        }
        
        // 事件绑定
        wrapper.addEventListener('mousedown', onDragStart);
        wrapper.addEventListener('touchstart', onDragStart, { passive: false });
        wrapper.style.cursor = 'grab';
        canvas.addEventListener('click', onCharacterClick);
        window.addEventListener('resize', onWindowResize);
        initPosition();
        setTimeout(() => { showBubble('💐 恭喜恭喜！拖拽我一起玩吧 💐', 2800); }, 600);
    })();
</script>
